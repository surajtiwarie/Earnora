function WithdrawPage() {
  const { balance, requestWithdrawal, savedUpis, savedBanks, withdrawalSyncError } = useAppState();
  const [amount, setAmount] = useState("");
  const [method, setMethod] = useState(savedUpis.length ? "upi" : (savedBanks.length ? "bank" : "upi"));
  const [selectedUpi, setSelectedUpi] = useState(savedUpis[0] || "");
  const [selectedBankId, setSelectedBankId] = useState((savedBanks[0] && savedBanks[0].id) || "");
  const [error, setError] = useState("");
  const [done, setDone] = useState(null);

  const amountNum = parseFloat(amount);
  const selectedBank = savedBanks.find(b => b.id === selectedBankId) || null;
  const methodValid = method === "upi" ? !!selectedUpi : !!selectedBank;
  const canSubmit = amountNum >= MIN_WITHDRAWAL && amountNum <= balance && methodValid;

  const submit = () => {
    if (!amountNum || amountNum < MIN_WITHDRAWAL) { setError("Minimum withdrawal amount is ₹" + MIN_WITHDRAWAL + "."); return; }
    if (amountNum > balance) { setError("Amount can't be more than your available balance."); return; }
    if (!methodValid) { setError(method === "upi" ? "Select a UPI ID to withdraw to." : "Select a bank account to withdraw to."); return; }
    setError("");
    const res = requestWithdrawal({
      amount: amountNum, method,
      upiId: method === "upi" ? selectedUpi : "",
      accountNumber: method === "bank" ? selectedBank.accountNumber : "",
      ifsc: method === "bank" ? selectedBank.ifsc : "",
    });
    if (res.ok) setDone(res.entry);
  };

  if (balance < MIN_WITHDRAWAL) return (
    <div className="page fade-up">
      <PageHeader title="Withdraw" backTo="/wallet" />
      <div className="ticket-confirm">
        <Icon.ShieldAlert width={22} height={22} style={{ color: "var(--orange)" }} />
        <p style={{ fontWeight: 600, margin: 0 }}>Balance too low to withdraw</p>
        <p className="sub" style={{ textAlign: "center" }}>You need at least ₹{MIN_WITHDRAWAL} in your wallet to request a withdrawal. Current balance: ₹{inr(balance)}.</p>
        <button className="btn block" onClick={() => navigate("/wallet")}>Back to wallet</button>
      </div>
    </div>
  );

  if (done) return (
    <div className="page fade-up">
      <PageHeader title="Withdraw" />
      <div className="ticket-confirm">
        <Icon.Check width={22} height={22} style={{ color: "var(--green)" }} />
        <p style={{ fontWeight: 600, margin: 0 }}>Withdrawal requested</p>
        <p className="sub" style={{ textAlign: "center" }}>₹{inr(done.amount)} will be sent to your {done.method === "upi" ? "UPI ID" : "bank account"} once approved. This usually takes 1–3 business days.</p>
        {withdrawalSyncError && (
          <p className="sub" style={{ textAlign: "center", color: "#B91C1C", background: "#FEF2F2", padding: "10px 12px", borderRadius: 10, border: "1px solid #FCA5A5" }}>
            ⚠️ Saved on this device, but syncing to the server failed: {withdrawalSyncError}<br />Screenshot this — it's the exact reason it's not reaching the admin panel.
          </p>
        )}
        <button className="btn block" onClick={() => navigate("/wallet")}>Back to wallet</button>
      </div>
    </div>
  );

  return (
    <div className="page fade-up">
      <PageHeader title="Withdraw" />
      <label className="field-label">Amount</label>
      <input className="input mono" type="number" inputMode="decimal" placeholder="0" value={amount} onChange={e => setAmount(e.target.value)} />
      <div className="withdraw-balance-hint">
        <span>Min ₹{MIN_WITHDRAWAL} · Available: ₹{inr(balance)}</span>
        <button onClick={() => setAmount(String(balance))}>Withdraw all</button>
      </div>

      <label className="field-label" style={{ marginTop: 18 }}>Payout method</label>
      <div className="method-seg">
        <button className={method === "upi" ? "on" : ""} onClick={() => setMethod("upi")}><Icon.Wallet width={15} height={15} /> UPI</button>
        <button className={method === "bank" ? "on" : ""} onClick={() => setMethod("bank")}><Icon.Bank width={15} height={15} /> Bank</button>
      </div>

      {method === "upi" ? (
        savedUpis.length > 0 ? (
          <div className="txn-list" style={{ marginTop: 14 }}>
            {savedUpis.map(u => (
              <div key={u} className={"saved-method-row" + (selectedUpi === u ? " on" : "")} onClick={() => setSelectedUpi(u)}>
                <span className="saved-method-radio" />
                <span className="mono" style={{ flex: 1 }}>{u}</span>
              </div>
            ))}
          </div>
        ) : (
          <p className="sub" style={{ marginTop: 10 }}>You haven't saved a UPI ID yet.</p>
        )
      ) : (
        savedBanks.length > 0 ? (
          <div className="txn-list" style={{ marginTop: 14 }}>
            {savedBanks.map(b => (
              <div key={b.id} className={"saved-method-row" + (selectedBankId === b.id ? " on" : "")} onClick={() => setSelectedBankId(b.id)}>
                <span className="saved-method-radio" />
                <span style={{ flex: 1 }}><span className="mono" style={{ display: "block" }}>•••• {b.accountNumber.slice(-4)}</span><span className="txn-date">{b.ifsc}</span></span>
              </div>
            ))}
          </div>
        ) : (
          <p className="sub" style={{ marginTop: 10 }}>You haven't saved a bank account yet.</p>
        )
      )}

      <button className="pm-link" onClick={() => navigate("/wallet/payment-methods")}>
        {method === "upi" ? (savedUpis.length >= UPI_LIMIT ? "Manage saved UPI IDs" : "+ Add a UPI ID") : (savedBanks.length >= BANK_LIMIT ? "Manage saved bank accounts" : "+ Add a bank account")}
        <Icon.Chevron width={12} height={12} />
      </button>

      {error && <p className="field-hint" style={{ color: "var(--red)" }}>{error}</p>}
      <button className="btn block" style={{ marginTop: 10 }} disabled={!canSubmit} onClick={submit}>Request withdrawal <Icon.Arrow /></button>
    </div>
  );
}

  const [copied, setCopied] = useState(false);
  const offer = SHARE_OFFERS.find(o => o.id === params.offerId);
  if (!offer) return <div className="page"><PageHeader title="Not found" backTo="/share" /><p className="sub">This link doesn't exist.</p></div>;
  const earned = offer.events.reduce((s, e) => s + (e.status === "Credited" ? e.amount : 0), 0);
  const copy = () => { if (navigator.clipboard) navigator.clipboard.writeText("https://" + offer.code).catch(() => {}); setCopied(true); setTimeout(() => setCopied(false), 1600); };

  return (
    <div className="page fade-up">
      <PageHeader title={offer.name} backTo="/share" />
      <p className="sub" style={{ marginTop: -8 }}>{offer.blurb}</p>
      <div className="stat-row">
        <div className="stat"><span className="stat-label">Earned</span><span className="serif stat-value">₹{inr(earned)}</span></div>
        <div className="stat"><span className="stat-label">Clicks</span><span className="serif stat-value">{offer.clicks}</span></div>
        <div className="stat"><span className="stat-label">Conversions</span><span className="serif stat-value">{offer.events.length}</span></div>
      </div>
      <div className="link-code-row" style={{ marginTop: 16 }}>
        <span className="mono link-code">{offer.code}</span>
        <button className="copy-btn" onClick={copy}>{copied ? <Icon.Check width={12} height={12} /> : <Icon.Copy width={12} height={12} />}{copied ? "Copied" : "Copy"}</button>
      </div>
      <h2 className="serif h2" style={{ fontSize: 18, marginTop: 24 }}>Who did what, when</h2>
      <p className="sub">Every click that converted through your link for this offer.</p>
      {offer.events.length === 0 ? <p className="sub">No clicks have converted yet — keep sharing.</p> : (
        <div className="who-list">
          {offer.events.map((e, i) => (
            <div key={i} className="who-row">
              <span className="txn-icon"><Icon.CreditIn /></span>
              <span className="txn-body"><span className="txn-label mono">{e.who}</span><span className="txn-date">{e.type} · {e.date}</span></span>
              <span style={{ textAlign: "right" }}>
                <span className={"event-status" + (e.status === "Pending" ? " pending" : "")} style={{ display: "block" }}>{e.status}</span>
                <span className="mono txn-amt">₹{inr(e.amount)}</span>
              </span>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function computeStrength(s) {
  const checks = [Boolean(s.name.trim()), s.phoneVerified, s.emailVerified, s.dobSet, Boolean(s.gender), Boolean(s.photo)];
  return Math.round((checks.filter(Boolean).length / checks.length) * 100);
}

function PhotoEditor({ src, onCancel, onSave }) {
  const imgRef = useRef(null);
  const vpRef = useRef(null);
  const [zoom, setZoom] = useState(1);
  const [dim, setDim] = useState(null);
  const [off, setOff] = useState({ x: 0, y: 0 });
  const drag = useRef(null);
  const [maxH, setMaxH] = useState(null);

  // Some Android WebViews report 100vh based on the full device screen rather than the
  // actually-visible viewport, which can push this sheet's footer buttons off-screen.
  // Measuring window.innerHeight directly sidesteps that and always matches what's visible.
  useEffect(() => {
    const measure = () => setMaxH(Math.round(window.innerHeight * 0.88));
    measure();
    window.addEventListener("resize", measure);
    window.addEventListener("orientationchange", measure);
    return () => { window.removeEventListener("resize", measure); window.removeEventListener("orientationchange", measure); };
  }, []);

  const clampOff = (o, z, d) => {
    if (!d) return o;
    const w = d.nw * d.base * z, h = d.nh * d.base * z;
    const mx = Math.max(0, (w - d.vp) / 2), my = Math.max(0, (h - d.vp) / 2);
    return { x: Math.min(mx, Math.max(-mx, o.x)), y: Math.min(my, Math.max(-my, o.y)) };
  };
  const onImgLoad = () => {
    const img = imgRef.current, vp = vpRef.current;
    if (!img || !vp) return;
    const vpSize = vp.clientWidth;
    const base = vpSize / Math.min(img.naturalWidth, img.naturalHeight);
    setDim({ nw: img.naturalWidth, nh: img.naturalHeight, base, vp: vpSize });
    setOff({ x: 0, y: 0 }); setZoom(1);
  };
  const onPointerDown = (e) => { drag.current = { sx: e.clientX, sy: e.clientY, ox: off.x, oy: off.y }; e.currentTarget.setPointerCapture(e.pointerId); };
  const onPointerMove = (e) => { if (!drag.current) return; const d = drag.current; setOff(clampOff({ x: d.ox + (e.clientX - d.sx), y: d.oy + (e.clientY - d.sy) }, zoom, dim)); };
  const onPointerUp = () => { drag.current = null; };
  const onZoom = (z) => { setZoom(z); setOff(o => clampOff(o, z, dim)); };

  const save = () => {
    const img = imgRef.current; if (!img || !dim) return;
    const OUT = 400, canvas = document.createElement("canvas");
    canvas.width = OUT; canvas.height = OUT;
    const ctx = canvas.getContext("2d");
    const scale = dim.base * zoom;
    const viewImg = dim.vp / scale;
    const sx = (dim.nw - viewImg) / 2 - off.x / scale;
    const sy = (dim.nh - viewImg) / 2 - off.y / scale;
    ctx.drawImage(img, sx, sy, viewImg, viewImg, 0, 0, OUT, OUT);
    onSave(canvas.toDataURL("image/jpeg", 0.92));
  };

  const imgStyle = dim
    ? { width: dim.nw * dim.base * zoom + "px", transform: "translate(calc(-50% + " + off.x + "px), calc(-50% + " + off.y + "px))" }
    : { opacity: 0 };
  return createPortal(
    <div className="pe-layer" role="dialog" aria-modal="true" aria-label="Adjust profile photo">
      <div className="pe-backdrop" onClick={onCancel}></div>
      <div className="pe-sheet" style={maxH ? { maxHeight: maxH + "px" } : undefined}>
        <div className="pe-head">
          <h2 className="serif" style={{ fontSize: 19, margin: 0 }}>Adjust photo</h2>
          <button className="icon-btn" aria-label="Close" onClick={onCancel}><Icon.Close /></button>
        </div>
        <div className="pe-body">
          <div className="pe-viewport" ref={vpRef} onPointerDown={onPointerDown} onPointerMove={onPointerMove} onPointerUp={onPointerUp} onPointerCancel={onPointerUp}>
            <img ref={imgRef} src={src} alt="" style={imgStyle} onLoad={onImgLoad} draggable={false} />
          </div>
          <p className="pe-hint">Drag to reposition your photo</p>
          <div className="pe-zoom-row">
            <span className="pe-zoom-mark">−</span>
            <input className="pe-zoom" type="range" min="1" max="3" step="0.01" value={zoom} onChange={e => onZoom(parseFloat(e.target.value))} aria-label="Zoom" />
            <span className="pe-zoom-mark">+</span>
          </div>
        </div>
        <div className="pe-actions">
          <button className="btn outline" onClick={onCancel}>Cancel</button>
          <button className="btn" onClick={save}>Save photo</button>
        </div>
      </div>
    </div>,
    document.body
  );
}

function ProfilePage() {
  const st = useAppState();
  const [saved, setSaved] = useState(false);
  const fileRef = useRef(null);

  useEffect(() => {
    const token = new URLSearchParams(window.location.search).get("emailVerifyToken");
    if (token) {
      // TODO: POST /me/email/confirm { token }
      st.setEmailStatus("verified");
      window.history.replaceState({}, "", window.location.pathname + window.location.hash);
    }
  }, []);
  useEffect(() => {
    if (st.emailResendIn <= 0) return;
    const id = setTimeout(() => st.setEmailResendIn(s => s - 1), 1000);
    return () => clearTimeout(id);
  }, [st.emailResendIn]);

  const sendVerification = () => {
    if (!isValidEmail(st.email) || st.emailResendIn > 0) return;
    // TODO: POST /me/email/verify-request { email }
    st.setEmailStatus("pending"); st.setEmailResendIn(60);
  };
  const [editSrc, setEditSrc] = useState(null);
  const pickPhoto = (e) => {
    const f = e.target.files && e.target.files[0];
    e.target.value = "";
    if (!f) return;
    const reader = new FileReader();
    reader.onload = () => setEditSrc(reader.result);
    reader.readAsDataURL(f);
  };
  const save = () => { if (st.dob) st.setDobLocked(true); setSaved(true); setTimeout(() => setSaved(false), 1800); };
  const strength = computeStrength({ name: st.name, phoneVerified: true, emailVerified: st.emailStatus === "verified", dobSet: st.dobLocked, gender: st.gender, photo: st.photo });

  return (
    <div className="page fade-up">
      <PageHeader title="Profile" />
      {editSrc && <PhotoEditor src={editSrc} onCancel={() => setEditSrc(null)} onSave={(d) => { st.setPhoto(d); setEditSrc(null); }} />}
      <div className="avatar-block">
        <div className="avatar-circle" style={st.photo ? { backgroundImage: "url(" + st.photo + ")" } : undefined}>{!st.photo && <Icon.User width={30} height={30} />}</div>
        <button className="avatar-pencil" aria-label="Change photo" onClick={() => { if (fileRef.current) fileRef.current.click(); }}><Icon.Pencil width={13} height={13} /></button>
        <input ref={fileRef} type="file" accept="image/*" hidden onChange={pickPhoto} />
      </div>
      <div className="profile-strength"><span>Profile strength</span><span className="profile-strength-pill">{strength}% complete</span></div>
      <label className="field-label">Full name</label>
      <input className="input" value={st.name} onChange={e => st.setName(e.target.value)} />
      <label className="field-label" style={{ marginTop: 16 }}>Mobile number</label>
      <div className="locked-field"><span className="mono">+91 {formatPhone(st.phone)}</span><span className="verified-pill">Verified</span></div>
      <p className="field-hint">Verified when you signed in with OTP — it can't be changed here.</p>
      <label className="field-label" style={{ marginTop: 16 }}>Email</label>
      {st.emailStatus === "verified" ? (
        <React.Fragment>
          <div className="locked-field"><span>{st.email}</span><span className="verified-pill">Verified</span></div>
          <p className="field-hint">Verified — it can't be changed here.</p>
        </React.Fragment>
      ) : st.emailStatus === "pending" ? (
        <div className="email-pending">
          <Icon.Mail width={18} height={18} />
          <div>
            <div style={{ fontWeight: 600, fontSize: 13.5 }}>Check your inbox</div>
            <div className="field-hint" style={{ margin: "3px 0 8px" }}>We sent a confirmation link to <strong>{st.email}</strong>. Click it to verify.</div>
            <button className="resend-link" style={{ margin: 0 }} disabled={st.emailResendIn > 0} onClick={sendVerification}>
              {st.emailResendIn > 0 ? "Resend link in " + st.emailResendIn + "s" : "Resend link"}
            </button>
            {/* DEV PREVIEW ONLY — remove once the real email + redirect flow is wired to a backend. */}
            <button className="resend-link" style={{ margin: "6px 0 0", color: "var(--ink-soft)" }} onClick={() => st.setEmailStatus("verified")}>
              Simulate confirmation click (preview only)
            </button>
          </div>
        </div>
      ) : (
        <React.Fragment>
          <div className="email-row">
            <input className="input" type="email" placeholder="you@example.com" value={st.email} onChange={e => st.setEmail(e.target.value)} />
            <button className="btn" style={{ padding: "0 18px" }} disabled={!isValidEmail(st.email)} onClick={sendVerification}>Verify</button>
          </div>
          <p className="field-hint">We'll email a confirmation link — click it to verify.</p>
        </React.Fragment>
      )}
      <label className="field-label" style={{ marginTop: 16 }}>Date of birth</label>
      {st.dobLocked ? (
        <React.Fragment>
          <div className="locked-field"><span>{new Date(st.dob).toLocaleDateString("en-IN", { day: "2-digit", month: "short", year: "numeric" })}</span><span className="verified-pill">Saved</span></div>
          <p className="field-hint">Set once and locked — contact support to change it.</p>
        </React.Fragment>
      ) : (
        <input className="input" type="date" value={st.dob} onChange={e => st.setDob(e.target.value)} />
      )}
      <label className="field-label" style={{ marginTop: 16 }}>Gender</label>
      <div className="gender-row">
        {["male", "female"].map(g => <button key={g} className={"gender-pill" + (st.gender === g ? " on" : "")} onClick={() => st.setGender(g)}>{g === "male" ? "Male" : "Female"}</button>)}
      </div>
      <button className="btn block" style={{ marginTop: 24 }} onClick={save}>{saved ? "Saved" : "Save changes"} {saved ? <Icon.Check /> : <Icon.Arrow />}</button>
    </div>
  );
}

function ActivityPage() {
  const { offersByStatusForCategory } = useAppState();
  const rows = Object.keys(CATEGORY_META).map(id => {
    const g = offersByStatusForCategory(id);
    return { id, title: CATEGORY_META[id].title, inProgress: g.inProgress.length, completed: g.completed.length, expired: g.expired.length };
  });
  return (
    <div className="page fade-up">
      <PageHeader title="My activity" />
      <p className="sub" style={{ marginTop: -8 }}>Where every offer you've touched currently stands.</p>
      <div className="offer-grid">
        {rows.map(r => (
          <div key={r.id} className="card activity-card">
            <div style={{ fontWeight: 600, fontSize: 14.5, marginBottom: 10 }}>{r.title}</div>
            <div className="activity-stats">
              <div><span className="mono activity-num" style={{ color: "var(--orange)" }}>{r.inProgress}</span><span>In progress</span></div>
              <div><span className="mono activity-num" style={{ color: "var(--green)" }}>{r.completed}</span><span>Completed</span></div>
              <div><span className="mono activity-num" style={{ color: "var(--red)" }}>{r.expired}</span><span>Expired</span></div>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

function NotificationsPage() {
  return (
    <div className="page fade-up">
      <PageHeader title="Notifications" />
      <div className="notif-list">
        {NOTIFICATIONS.map(n => {
          const Ico = Icon[n.iconKey];
          return (
            <div key={n.id} className="notif-card">
              <span className="txn-icon"><Ico /></span>
              <span className="txn-body"><span className="txn-label">{n.title}</span><span className="notif-body">{n.body}</span><span className="txn-date">{n.time}</span></span>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function FeedbackContactPage({ mode }) {
  const { emailStatus } = useAppState();
  const [category, setCategory] = useState("");
  const [details, setDetails] = useState("");
  const [ticket, setTicket] = useState(null);
  const title = mode === "contact" ? "Contact us" : "Feedback";
  const emailVerified = emailStatus === "verified";
  const submit = () => {
    if (!category || !details.trim()) return;
    // TODO: POST /support/{feedback|contact} — every ticket gets a unique ID.
    if (mode === "contact") setTicket("MG-" + Math.floor(100000 + Math.random() * 900000));
    else setTicket("sent");
  };
  if (!emailVerified) return (
    <div className="page fade-up">
      <PageHeader title={title} />
      <div className="email-gate">
        <span className="email-gate-icon"><Icon.Mail width={22} height={22} /></span>
        <p style={{ fontWeight: 600, fontSize: 15.5, margin: 0 }}>Link your email to continue</p>
        <p className="sub" style={{ textAlign: "center" }}>{mode === "contact" ? "We reply to support tickets by email, so verify one before raising a ticket." : "Verifying an email lets us follow up on your feedback if needed."}</p>
        <button className="btn" style={{ padding: "13px 22px" }} onClick={() => navigate("/profile")}>Link email <Icon.Arrow /></button>
      </div>
    </div>
  );
  return (
    <div className="page fade-up">
      <PageHeader title={title} />
      {ticket ? (
        <div className="ticket-confirm">
          <Icon.Check width={22} height={22} style={{ color: "var(--green)" }} />
          {mode === "contact" ? (
            <React.Fragment>
              <p style={{ fontWeight: 600, margin: 0 }}>Ticket {ticket}</p>
              <p className="sub">We'll reply on your registered email. Keep this ID for reference.</p>
            </React.Fragment>
          ) : <p style={{ fontWeight: 600, margin: 0 }}>Thanks for the feedback.</p>}
        </div>
      ) : (
        <React.Fragment>
          <label className="field-label">Category</label>
          <select className="input" value={category} onChange={e => setCategory(e.target.value)}>
            <option value="">Select a category</option>
            <option>Wallet &amp; payments</option>
            <option>Offers &amp; tracking</option>
            <option>Account &amp; login</option>
            <option>Other</option>
          </select>
          <label className="field-label" style={{ marginTop: 16 }}>Details</label>
          <textarea className="input textarea" maxLength={250} placeholder={mode === "contact" ? "Let us know your issue here." : "Enter your details"} value={details} onChange={e => setDetails(e.target.value)} />
          <div className="char-count">{details.length}/250 words</div>
          <button className="btn block" onClick={submit} disabled={!category || !details.trim()}>Submit <Icon.Arrow /></button>
        </React.Fragment>
      )}
    </div>
  );
}

const FAQ_DATA = {
  "Transfer": [
    ["Why is my wallet locked?", "Wallets are temporarily locked if unusual activity is detected on your account. Contact support to review it."],
    ["How to add my bank/UPI details?", "Go to Wallet, tap Withdraw, then Add payment method and enter your bank or UPI details."],
    ["How to withdraw my earnings?", "Open Wallet, tap Withdraw, choose a payment method and confirm the amount."],
    ["How long does a transfer take?", "Most transfers complete within 24–48 hours once approved."],
  ],
  "Share & Earn": [
    ["How is a conversion tracked?", "Each offer's link is unique to your account, so any click or conversion through it is attributed to you automatically."],
    ["Why does a conversion show Pending?", "The partner network confirms conversions in batches — it moves to Credited once they verify it."],
  ],
};

function FaqsPage() {
  const [openKey, setOpenKey] = useState(null);
  return (
    <div className="page fade-up">
      <PageHeader title="FAQs" />
      {Object.keys(FAQ_DATA).map(section => (
        <div key={section} style={{ marginBottom: 20 }}>
          <div className="drawer-heading" style={{ padding: "0 0 8px" }}>{section}</div>
          <div className="faq-list">
            {FAQ_DATA[section].map((qa, i) => {
              const key = section + "-" + i;
              const open = openKey === key;
              return (
                <div key={key} className="faq-item">
                  <button className="faq-q" onClick={() => setOpenKey(open ? null : key)}>
                    {qa[0]}<Icon.Chevron style={{ transform: open ? "rotate(90deg)" : "none" }} />
                  </button>
                  {open && <p className="faq-a">{qa[1]}</p>}
                </div>
              );
            })}
          </div>
        </div>
      ))}
    </div>
  );
}

function LegalPage({ title }) {
  return (
    <div className="page fade-up">
      <PageHeader title={title} />
      <p className="sub" style={{ marginTop: 4 }}>This section will hold the live {title.toLowerCase()} text, managed from the admin panel's content editor so it can change without a new release.</p>
    </div>
  );
}

function NotFoundPage() {
  return <div className="page"><h1 className="serif h1">Not found</h1><p className="sub">This page doesn't exist.</p></div>;
}

/* ============================== Route table ============================== */
const ROUTES = [
  { pattern: "/", render: () => <Home /> },
  { pattern: "/offers/:categoryId", render: (p) => <CategoryListing params={p} /> },
  { pattern: "/offers/:categoryId/:offerId", render: (p) => <OfferDetail params={p} /> },
  { pattern: "/offers/:categoryId/:offerId/security-check", render: (p) => <SecurityCheck params={p} /> },
  { pattern: "/wallet", render: () => <WalletPage /> },
  { pattern: "/wallet/withdraw", render: () => <WithdrawPage /> },
  { pattern: "/wallet/payment-methods", render: () => <PaymentMethodsPage /> },
  { pattern: "/share", render: () => <ShareEarnPage /> },
  { pattern: "/share/:offerId", render: (p) => <OfferActivityPage params={p} /> },
  { pattern: "/profile", render: () => <ProfilePage /> },
  { pattern: "/activity", render: () => <ActivityPage /> },
  { pattern: "/notifications", render: () => <NotificationsPage /> },
  { pattern: "/support/feedback", render: () => <FeedbackContactPage mode="feedback" /> },
  { pattern: "/support/contact", render: () => <FeedbackContactPage mode="contact" /> },
  { pattern: "/support/faqs", render: () => <FaqsPage /> },
  { pattern: "/legal/privacy", render: () => <LegalPage title="Privacy policy" /> },
  { pattern: "/legal/terms", render: () => <LegalPage title="Terms & conditions" /> },
];

function AppRouter() {
  const path = useRoute();
  const { isAuthenticated } = useAppState();
  const [splashDone, setSplashDone] = useState(!!getSplashShown());

  let redirect = null;
  if (path === "/login" && isAuthenticated) redirect = "/";
  else if (path !== "/login" && splashDone && !isAuthenticated) redirect = "/login";

  useEffect(() => { if (redirect) navigate(redirect, { replace: true }); }, [redirect, path]);

  if (path === "/login" && !isAuthenticated) return <Login />;
  if (!splashDone) return <Splash onDone={() => setSplashDone(true)} />;
  if (redirect) return null;

  let content = null;
  for (const route of ROUTES) {
    const params = matchPath(route.pattern, path);
    if (params) { content = route.render(params); break; }
  }
  if (!content) content = <NotFoundPage />;

  // Keyed by path so page state (tabs, timers) resets on navigation.
  return <AppLayout path={path}>{React.cloneElement(content, { key: path })}</AppLayout>;
}

function App() {
  return (
    <AppStateProvider>
      <AppRouter />
    </AppStateProvider>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
// FIX: this used to be loadOffersFromSupabase().finally(() => root.render(<App />)),
// so the ENTIRE app (even the splash screen) waited for a full network round-trip
// to Supabase before anything appeared — slow/flaky connections meant a long delay
// before the user saw anything at all. Now the app renders immediately; offers load
// in the background and the app re-renders once they're ready (usually well within
// the 1.5s splash window, so it's invisible in practice).
root.render(<App />);
loadOffersFromSupabase().then(() => root.render(<App />));
</script>
